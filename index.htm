<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>筋トレフォーム図鑑 Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        /* スムーズな開閉アニメーション用 */
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, padding 0.3s ease-out;
        }
        .accordion-content.open {
            max-height: 1200px;
            transition: max-height 0.4s ease-in, padding 0.4s ease-in;
        }
    </style>
</head>
<body class="pb-16">

    <header class="bg-[#1e1e1e] border-b border-[#2d2d2d] sticky top-0 z-50 px-4 py-4 text-center shadow-md">
        <h1 class="text-xl font-bold text-[#ff9f43] tracking-wider flex items-center justify-center gap-2">
            <i class="fa-solid fa-dumbbell text-2xl animate-pulse"></i> WORKOUT GUIDE PRO
        </h1>
    </header>

    <main class="max-w-md mx-auto px-4 mt-5">

        <div class="relative mb-5">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-500">
                <i class="fa-solid fa-magnifying-glass"></i>
            </span>
            <input type="text" id="search-input" oninput="handleSearch()" 
                   class="w-full bg-[#1e1e1e] border border-[#2d2d2d] rounded-xl py-3 pl-10 pr-4 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-[#ff9f43] focus:border-transparent transition-all" 
                   placeholder="種目名、部位、キーワードで検索...">
        </div>
        
        <div class="mb-4">
            <label class="text-xs font-bold text-gray-500 block mb-2 px-1">TARGET AREA / 対象部位</label>
            <div class="flex bg-[#1e1e1e] p-1 rounded-xl border border-[#2d2d2d] overflow-x-auto scrollbar-none gap-1">
                <button onclick="setAreaFilter('all')" id="area-all" class="flex-1 whitespace-nowrap text-center py-2 px-3 text-xs font-bold rounded-lg bg-[#ff9f43] text-[#121212] transition-all">
                    すべて
                </button>
                <button onclick="setAreaFilter('upper')" id="area-upper" class="flex-1 whitespace-nowrap text-center py-2 px-3 text-xs font-bold text-gray-400 rounded-lg transition-all">
                    上半身
                </button>
                <button onclick="setAreaFilter('lower')" id="area-lower" class="flex-1 whitespace-nowrap text-center py-2 px-3 text-xs font-bold text-gray-400 rounded-lg transition-all">
                    下半身
                </button>
                <button onclick="setAreaFilter('core')" id="area-core" class="flex-1 whitespace-nowrap text-center py-2 px-3 text-xs font-bold text-gray-400 rounded-lg transition-all">
                    体幹
                </button>
                <button onclick="setAreaFilter('cardio')" id="area-cardio" class="flex-1 whitespace-nowrap text-center py-2 px-3 text-xs font-bold text-gray-400 rounded-lg transition-all">
                    有酸素
                </button>
            </div>
        </div>

        <div class="mb-6">
            <label class="text-xs font-bold text-gray-500 block mb-2 px-1">EQUIPMENT TYPE / 器具タイプ</label>
            <div class="grid grid-cols-4 bg-[#1e1e1e] p-1 rounded-xl border border-[#2d2d2d] gap-1">
                <button onclick="setTypeFilter('all')" id="type-all" class="text-center py-1.5 text-[11px] font-bold rounded-md bg-[#2d2d2d] text-[#ff9f43] transition-all">
                    すべて
                </button>
                <button onclick="setTypeFilter('machine')" id="type-machine" class="text-center py-1.5 text-[11px] font-bold text-gray-400 rounded-md transition-all">
                    マシン
                </button>
                <button onclick="setTypeFilter('dumbbell')" id="type-dumbbell" class="text-center py-1.5 text-[11px] font-bold text-gray-400 rounded-md transition-all">
                    ダンベル
                </button>
                <button onclick="setTypeFilter('body')" id="type-body" class="text-center py-1.5 text-[11px] font-bold text-gray-400 rounded-md transition-all">
                    自重
                </button>
            </div>
        </div>

        <div class="flex justify-between items-center mb-4 px-1 text-xs text-gray-500">
            <span id="result-count">該当: 0 種目</span>
            <span id="filter-status" class="italic"></span>
        </div>

        <div id="workout-list" class="space-y-4">
            </div>

        <div id="no-results" class="hidden text-center py-12">
            <i class="fa-solid fa-face-frown text-5xl text-gray-600 mb-3"></i>
            <p class="text-gray-400 font-bold">該当する種目が見つかりませんでした</p>
            <p class="text-gray-600 text-xs mt-1">別のキーワードやフィルターをお試しください</p>
        </div>

    </main>

            }

        // ==========================================
        // 状態管理（フィルターと検索状態）
        // ==========================================
        let currentAreaFilter = 'all';
        let currentTypeFilter = 'all';
        let currentSearchQuery = '';

        // ==========================================
        // UI制御 ＆ レンダリングロジック
        // ==========================================

        // アコーディオンのトグル
        function toggleDetail(id) {
            const detail = document.getElementById(`detail-${id}`);
            const icon = document.getElementById(`icon-${id}`);
            
            if (detail.classList.contains('open')) {
                detail.classList.remove('open');
                detail.style.paddingTop = '0px';
                detail.style.paddingBottom = '0px';
                icon.style.transform = 'rotate(0deg)';
                setTimeout(() => { detail.classList.add('hidden'); }, 300);
            } else {
                detail.classList.remove('hidden');
                setTimeout(() => {
                    detail.classList.add('open');
                    detail.style.paddingTop = '16px';
                    detail.style.paddingBottom = '16px';
                    icon.style.transform = 'rotate(180deg)';
                }, 10);
            }
        }

        // 部位フィルター切り替え
        function setAreaFilter(category) {
            currentAreaFilter = category;
            
            const areaKeys = ['all', 'upper', 'lower', 'core', 'cardio'];
            areaKeys.forEach(k => {
                const el = document.getElementById(`area-${k}`);
                if (k === category) {
                    el.classList.add('bg-[#ff9f43]', 'text-[#121212]');
                    el.classList.remove('text-gray-400');
                } else {
                    el.classList.remove('bg-[#ff9f43]', 'text-[#121212]');
                    el.classList.add('text-gray-400');
                }
            });

            renderWorkouts();
        }

        // 器具タイプフィルター切り替え
        function setTypeFilter(type) {
            currentTypeFilter = type;

            const typeKeys = ['all', 'machine', 'dumbbell', 'body'];
            typeKeys.forEach(k => {
                const el = document.getElementById(`type-${k}`);
                if (k === type) {
                    el.classList.add('bg-[#2d2d2d]', 'text-[#ff9f43]');
                    el.classList.remove('text-gray-400');
                } else {
                    el.classList.remove('bg-[#2d2d2d]', 'text-[#ff9f43]');
                    el.classList.add('text-gray-400');
                }
            });

            renderWorkouts();
        }

        // 検索入力の監視
        function handleSearch() {
            const input = document.getElementById('search-input');
            currentSearchQuery = input.value.trim().toLowerCase();
            renderWorkouts();
        }

        // 画面へのレンダリング
        function renderWorkouts() {
            const container = document.getElementById('workout-list');
            const noResultsEl = document.getElementById('no-results');
            const countEl = document.getElementById('result-count');
            const statusEl = document.getElementById('filter-status');

            // データフィルタリング
            const filteredData = workoutData.filter(item => {
                const matchArea = currentAreaFilter === 'all' || item.area === currentAreaFilter;
                const matchType = currentTypeFilter === 'all' || item.type === currentTypeFilter;
                const matchSearch = currentSearchQuery === '' || 
                                    item.name.toLowerCase().includes(currentSearchQuery) ||
                                    item.target.toLowerCase().includes(currentSearchQuery) ||
                                    item.form.toLowerCase().includes(currentSearchQuery);

                return matchArea && matchType && matchSearch;
            });

            // HTML生成
            if (filteredData.length === 0) {
                container.innerHTML = '';
                noResultsEl.classList.remove('hidden');
            } else {
                noResultsEl.classList.add('hidden');
                
                const cardsHtml = filteredData.map(item => {
                    let typeBadgeColor = 'text-green-400 bg-[#1b2b22]'; // 自重（緑）
                    if (item.type === 'machine') {
                        typeBadgeColor = 'text-cyan-400 bg-[#162730]'; // マシン（水色）
                    } else if (item.type === 'dumbbell') {
                        typeBadgeColor = 'text-purple-400 bg-[#251b30]'; // ダンベル（紫）
                    } else if (item.area === 'cardio') {
                        typeBadgeColor = 'text-pink-400 bg-[#301625]'; // 有酸素（ピンク）
                    }

                    return `
                        <div class="workout-card bg-[#1e1e1e] border border-[#2d2d2d] rounded-xl overflow-hidden shadow-lg transition-all hover:border-[#3d3d3d]">
                            <div class="p-4 flex justify-between items-center cursor-pointer select-none" onclick="toggleDetail('${item.id}')">
                                <div>
                                    <span class="text-[10px] bg-[#2d2d2d] text-[#ff9f43] px-2 py-0.5 rounded font-bold mr-1">${item.areaLabel}</span>
                                    <span class="text-[10px] px-2 py-0.5 rounded font-bold mr-2 ${typeBadgeColor}">${item.typeLabel}</span>
                                    <h2 class="text-sm font-bold inline-block mt-1 text-white">${item.name}</h2>
                                </div>
                                <i id="icon-${item.id}" class="fa-solid fa-chevron-down text-gray-500 transition-transform duration-300"></i>
                            </div>
                            <div id="detail-${item.id}" class="accordion-content hidden border-t border-[#2d2d2d] bg-[#161616] px-4 text-sm space-y-4">
                                <div class="mt-2">
                                    <span class="text-[11px] font-bold text-gray-500 tracking-wider flex items-center gap-1"><i class="fa-solid fa-play"></i> ACTION PREVIEW / 動作アニメーション</span>
                                    ${item.svg}
                                </div>
                                
                                <div class="pt-2">
                                    <span class="text-[#ff9f43] font-bold flex items-center gap-1.5"><i class="fa-solid fa-circle-check"></i> 正しいフォーム</span>
                                    <p class="text-gray-300 mt-1 pl-4 border-l-2 border-[#ff9f43]/40 leading-relaxed">${item.form}</p>
                                </div>
                                <div>
                                    <span class="text-[#ff6b6b] font-bold flex items-center gap-1.5"><i class="fa-solid fa-circle-xmark"></i> NGポイント</span>
                                    <p class="text-gray-300 mt-1 pl-4 border-l-2 border-[#ff6b6b]/40 leading-relaxed">${item.ng}</p>
                                </div>
                                <div>
                                    <span class="text-cyan-400 font-bold flex items-center gap-1.5"><i class="fa-solid fa-lightbulb"></i> 効かせるコツ</span>
                                    <p class="text-gray-300 mt-1 pl-4 border-l-2 border-cyan-400/40 leading-relaxed">${item.tip}</p>
                                </div>
                                <div class="bg-[#2d2d2d] p-2.5 rounded-lg text-xs text-gray-300 text-center font-bold">
                                    🎯 ターゲット: ${item.target}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                container.innerHTML = cardsHtml;
            }

            countEl.textContent = `該当: ${filteredData.length} 種目`;
            
            let statusText = '';
            if (currentAreaFilter !== 'all' || currentTypeFilter !== 'all' || currentSearchQuery !== '') {
                statusText = 'フィルター適用中';
            }
            statusEl.textContent = statusText;
        }

        window.onload = function() {
            renderWorkouts();
        };
    </script>
</body>
